      <rect width="84" height="22" rx="11" fill="rgba(123,232,161,0.15)" stroke="rgba(123,232,161,0.35)"/>
      <text x="42" y="14" text-anchor="middle" class="tag text-success">LIVE · BETA</text>
    </g>
  </g>

  <!-- community -->
  <g transform="translate(712, 200)">
    <rect width="640" height="100" rx="14" fill="url(#card-sub)" stroke="#3A2D4A" opacity="0.78"/>
    <rect x="0" y="0" width="80" height="3" fill="#C4384A"/>
    <g transform="translate(20, 28)">
      <circle cx="6" cy="6" r="6" fill="#C4384A" opacity="0.7"/>
      <text x="20" y="10" class="tag text-mute">A · 夜職コミュニティ · CLOSED SNS</text>
    </g>
    <text x="20" y="68" class="display-jp text" font-size="22">紹介制 SNS</text>
