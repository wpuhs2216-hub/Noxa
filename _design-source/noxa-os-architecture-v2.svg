    <text x="20" y="68" class="display-jp text" font-size="22">バー紹介 + 求人 + コラム</text>
    <text x="20" y="88" class="text-mute" font-size="11" font-family="'Noto Sans JP', sans-serif">
      バー客・オーナー・求職キャスト向け。既存 nomishugy リポで運用中。
    </text>
    <!-- status badge -->
