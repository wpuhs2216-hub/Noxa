<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" role="img" aria-labelledby="t d">
  <title id="t">NOXA — ナイトワーク OS Architecture v2</title>
  <desc id="d">NOXA は「夜の街の OS」。中核は 9 つのメイン業務モジュール（POS / 売上管理 / 席回し / 勤怠管理 / 給与計算 / 初回案内 / 送迎 / 在庫管理 / オリシャン名刺発注）と、その上のサブモジュール（夜職専用紹介制コミュニティ / のみシュギ）。共通基盤は Firebase noxa-platform、Auth UID で SSO、Stripe で課金統合、Vercel + Capacitor で Web + Android 同時配信、iOS は別リポで SwiftUI。</desc>

  <defs>
    <radialGradient id="amb1" cx="50%" cy="0%" r="60%">
      <stop offset="0%"   stop-color="#8B5CF6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amb2" cx="100%" cy="100%" r="60%">
      <stop offset="0%"   stop-color="#C084FC" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1228"/>
      <stop offset="100%" stop-color="#110A1C"/>
    </linearGradient>
    <linearGradient id="card-sub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#221830"/>
      <stop offset="100%" stop-color="#1A1228"/>
    </linearGradient>
    <linearGradient id="card-main" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(139,92,246,0.18)"/>
      <stop offset="100%" stop-color="rgba(139,92,246,0)"/>
    </linearGradient>
    <radialGradient id="hub" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#221830"/>
      <stop offset="100%" stop-color="#0F0818"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      .bg          { fill: #07050D; }
      .border      { stroke: #2A2038; fill: none; }
      .divider     { stroke: rgba(184, 156, 251, 0.20); }
      .border-ink  { stroke: rgba(184, 156, 251, 0.32); fill: none; }
      .text        { fill: #F5F1FA; font-family: 'Geist', 'Noto Sans JP', system-ui, sans-serif; }
      .text-mute   { fill: #A89FBE; }
      .text-faint  { fill: #6E6585; }
      .text-ink    { fill: #B89CFB; }
      .text-neon   { fill: #C084FC; }
      .text-info   { fill: #67E8F9; }
      .text-success{ fill: #7BE8A1; }
      .text-warn   { fill: #F5D472; }
      .text-error  { fill: #C4384A; }
      .display     { font-family: 'Cormorant Garamond', 'Shippori Mincho B1', serif; font-weight: 500; }
      .display-jp  { font-family: 'Shippori Mincho B1', 'Cormorant Garamond', serif; font-weight: 500; }
      .mono        { font-family: 'JetBrains Mono', ui-monospace, monospace; }
      .eyebrow     { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; fill: #B89CFB; }
      .tag         { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; }
      .module-num  { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 400; font-size: 22px; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="1000"/>
  <rect width="1400" height="1000" fill="url(#amb1)"/>
  <rect width="1400" height="1000" fill="url(#amb2)"/>

  <!-- ==================== HEADER ==================== -->
  <g transform="translate(48, 40)">
    <text class="eyebrow">NOXA · OS Architecture · v2 · 2026.05</text>
    <line x1="260" y1="-4" x2="1300" y2="-4" class="divider" stroke-width="1"/>
  </g>

  <g transform="translate(48, 80)">
    <text class="display text" font-size="48" letter-spacing="-0.01em">
      N<tspan class="text-ink">O</tspan>XA — <tspan font-style="italic" class="text-ink">ナイトワーク OS</tspan>
    </text>
    <text y="34" class="text-mute" font-size="15" font-family="'Shippori Mincho B1', serif" letter-spacing="0.04em">
      夜の街で必要なすべての業務を、ひとつの OS で。<tspan class="text-faint">個人キャストもオーナーも、同じ画面から。</tspan>
    </text>
  </g>

