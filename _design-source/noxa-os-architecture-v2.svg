      <text x="42" y="14" text-anchor="middle" class="tag text-mute">SOON</text>
    </g>
  </g>

  <!-- arrows DOWN -->
  <line x1="368" y1="320" x2="368" y2="370" stroke="#6E6585" stroke-width="1.5" stroke-dasharray="3 4"/>
  <line x1="1032" y1="320" x2="1032" y2="370" stroke="#6E6585" stroke-width="1.5" stroke-dasharray="3 4"/>

  <!-- ==================== LAYER 2: NOXA OS Kernel ==================== -->
  <g transform="translate(48, 350)">
    <text class="eyebrow">CORE · NOXA Operating System Kernel</text>
  </g>

  <g transform="translate(48, 370)">
    <rect width="1304" height="60" rx="14" fill="rgba(26,18,40,0.65)" stroke="rgba(184,156,251,0.32)"/>
    <g transform="translate(28, 22)">
      <text class="display text" font-size="24">N<tspan class="text-ink">O</tspan>XA</text>
      <text x="120" y="-2" class="tag text-faint">DASHBOARD SHELL</text>
      <text x="120" y="14" class="text" font-size="12">役割別ホーム · 9 メイン + 2 サブを束ねる操作盤</text>
    </g>
    <g transform="translate(680, 22)">
      <text class="tag text-faint">SSO · 1 アカウント = 全モジュール</text>
      <text y="16" class="mono text-info" font-size="11">Firebase Auth UID</text>
    </g>
    <g transform="translate(1020, 22)">
      <text class="tag text-faint">課金</text>
      <text y="16" class="mono text-info" font-size="11">Stripe · NOXA Pro 共通プラン</text>
    </g>
  </g>

