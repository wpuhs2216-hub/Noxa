  <g transform="translate(48, 850)">
    <rect width="1304" height="100" rx="14" fill="rgba(26,18,40,0.6)" stroke="#2A2038"/>
    <g transform="translate(24, 24)">
      <text class="tag text-ink">DATA</text>
      <text y="16" class="text" font-size="11" font-weight="600">Firebase noxa-platform</text>
